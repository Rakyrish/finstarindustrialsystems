# ──────────────────────────────────────────────────────────────────────────────
# FINSTAR Industrial Systems — HTTP-Only Active Config
# Used during first-time certificate issuance and safe default startup.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    access_log /var/log/nginx/access.log;

    sendfile          on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name finstarindustrials.com www.finstarindustrials.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /django-admin {
            return 301 /root/admin/;
        }

        location ^~ /django-admin/ {
            rewrite ^/django-admin/?(.*)$ /root/admin/$1 permanent;
        }

        location = /root/admin {
            return 301 /root/admin/;
        }

        location ^~ /root/admin/ {
            add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
            rewrite ^/root/admin/?(.*)$ /admin/$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location ^~ /api/ {
            add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
