# ──────────────────────────────────────────────────────────────────────────────
# FINSTAR Industrial Systems — Production Docker Compose
# ──────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   docker compose up -d --build      # Start all services
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop + remove volumes (⚠️ deletes DB data)
#
# First deployment with SSL:
#   chmod +x init-ssl.sh && ./init-ssl.sh
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - finstar-network

  # ── Django Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./finstar_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: root
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "False"
      ALLOWED_HOSTS: "finstarindustrials.com,www.finstarindustrials.com,backend,localhost"
      CORS_ALLOWED_ORIGINS: "https://finstarindustrials.com,https://www.finstarindustrials.com"
      CSRF_TRUSTED_ORIGINS: "https://finstarindustrials.com,https://www.finstarindustrials.com"
    volumes:
      - backend-static:/app/staticfiles
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finstar-network

  inventory-sync-worker:
    build:
      context: ./finstar_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: root
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "False"
      ALLOWED_HOSTS: "finstarindustrials.com,www.finstarindustrials.com,backend,localhost"
      CORS_ALLOWED_ORIGINS: "https://finstarindustrials.com,https://www.finstarindustrials.com"
      CSRF_TRUSTED_ORIGINS: "https://finstarindustrials.com,https://www.finstarindustrials.com"
    entrypoint: ["/bin/bash", "-c"]
    command: ["python manage.py migrate --noinput && python manage.py run_inventory_sync_worker --sleep-seconds 5"]
    volumes:
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finstar-network

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://finstarindustrials.com/"
        NEXT_PUBLIC_BASE_URL: "https://finstarindustrials.com"
    restart: unless-stopped
    environment:
      # Internal URL for SSR requests (container-to-container)
      INTERNAL_API_URL: "http://backend:8000/"
    depends_on:
      - backend
    networks:
      - finstar-network

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.active.conf:/etc/nginx/nginx.conf:ro
      - backend-static:/app/staticfiles:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - finstar-network

  # ── Certbot (SSL Certificate Manager) ───────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Auto-renew: check every 12 hours, renew if within 30 days of expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx
    networks:
      - finstar-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  backend-static:
    driver: local
  backend-logs:
    driver: local
  certbot-webroot:
    driver: local
  certbot-certs:
    driver: local

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  finstar-network:
    driver: bridge
